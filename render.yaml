services:
  - type: web
    name: crawler-dashboard
    runtime: docker
    plan: free
    region: ohio
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: REDIS_URI
        fromService:
          type: redis
          name: crawler-queue
          property: connectionString
      - key: MONGO_URI
        sync: false # User must set this in the Render dashboard
      - key: MAX_WORKER_THREADS
        value: "5"
      - key: CRAWL_DELAY_SECONDS
        value: "1.0"

  - type: redis
    name: crawler-queue
    plan: free
    region: ohio
    ipAllowList: [] # Private network only
